<!DOCTYPE html>
<html>
<head>
  <title>Owner Operator Dashboard - FCC Driver Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .header {
      background: #111827;
      padding: 20px;
      text-align: center;
    }

    .section {
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .map-box {
      width: 100%;
      height: 420px;
      border: 0;
      border-radius: 12px;
    }

    .back-link {
      color: #93c5fd;
      text-decoration: none;
      font-weight: bold;
    }

    .info {
      line-height: 1.8;
    }

    .status {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #3f6212;
      color: #d9f99d;
      font-size: 12px;
      font-weight: bold;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Owner Operator Dashboard</h1>
    <p>Fleet visibility and driver tracking status</p>
  </div>

  <div class="section">
    <div class="card">
      <a class="back-link" href="/index.html">← Back to Home</a>
    </div>

    <div class="card">
      <h2>Fleet Driver Details</h2>
      <div class="info" id="ownerInfo">
        No fleet data found yet.
      </div>
      <div id="ownerStatus" class="status">WAITING FOR DRIVER</div>
    </div>

    <div class="card">
      <h2>Fleet Map</h2>
      <iframe
        id="ownerMap"
        class="map-box"
        src="https://www.google.com/maps?q=Atlanta,GA&output=embed">
      </iframe>
    </div>
  </div>

  <script>
    function loadDriverData() {
      const data = JSON.parse(localStorage.getItem("fccDriverData")) || {};
      const ownerInfo = document.getElementById("ownerInfo");
      const ownerStatus = document.getElementById("ownerStatus");
      const ownerMap = document.getElementById("ownerMap");

      ownerInfo.innerHTML =
        "Driver Name: " + (data.driverName || "Not set") + "<br>" +
        "Truck Number: " + (data.truckNumber || "Not set") + "<br>" +
        "Load Number: " + (data.loadNumber || "Not set") + "<br>" +
        "Fleet Status: " + (data.driverStatus || "Not set") + "<br>" +
        "Last Update: " + (data.updatedAt || "Not available");

      if (data.lat && data.lng) {
        ownerMap.src = "https://www.google.com/maps?q=" + data.lat + "," + data.lng + "&output=embed";
      }

      ownerStatus.textContent = data.isTracking ? "FLEET TRACKING ACTIVE" : "TRACKING OFF";
    }

    loadDriverData();
    setInterval(loadDriverData, 5000);
  </script>
</body>
</html>
