<!DOCTYPE html>
<html>
<head>
  <title>FCC Broker Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; }
    .header { background:#111827; padding:20px; text-align:center; }
    .section { padding:20px; max-width:1300px; margin:auto; }
    .card { background:#1e293b; border-radius:12px; padding:16px; margin-bottom:16px; }
    #map { height:600px; border-radius:12px; }
    .button { padding:10px 14px; background:#2563eb; color:white; border:none; border-radius:8px; cursor:pointer; margin:5px; }
    .badge { padding:5px 10px; border-radius:20px; font-size:12px; }
    .green { background:#166534; }
    .red { background:#991b1b; }
    .yellow { background:#854d0e; }
  </style>
</head>

<body>

<div class="header">
  <h1>FCC Broker Dashboard</h1>
</div>

<div class="section">

<div class="card">
  <input id="destinationInput" placeholder="Enter destination (Jacksonville, Florida)" style="width:100%;padding:10px;border-radius:8px;border:none;">
  
  <select id="routeMode" style="width:100%;padding:10px;border-radius:8px;margin-top:10px;">
    <option value="fastest">Fastest</option>
    <option value="noTolls">No Tolls</option>
    <option value="avoidHighways">Avoid Highways</option>
  </select>

  <button class="button" onclick="buildRoute()">Build Route</button>
</div>

<div class="card">
  <button class="button" onclick="zoomAll()">Zoom All</button>
  <button class="button" onclick="stopFollow()">Stop Follow</button>
</div>

<div id="map"></div>

<div class="card" id="routePanel">No route yet</div>

</div>

<script>

const supabase = window.supabase.createClient(
  "https://mubhwsjppmebuwpmsuwg.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11Ymh3c2pwcG1lYnV3cG1zdXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDEwMjcsImV4cCI6MjA5MTYxNzAyN30.v37pbEsIFvGUAF5vPsqmogVpYa9kdCM42Im8xSCiHSM"
);

// ✅ YOUR TOMTOM KEY ADDED
const TOMTOM_API_KEY = "Y18RLm8evGUvp0THSxz50lZJZMYNqH25";

let map = L.map("map").setView([33.749, -84.388], 6);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let markers = [];
let followId = null;
let routeLine = null;
let drivers = [];

function markerColor(driver){
  if(!driver.is_tracking) return "red";
  let mins = (Date.now() - new Date(driver.updated_at)) / 60000;
  if(mins > 5) return "yellow";
  return "green";
}

function drawDrivers(){
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  drivers.forEach(d=>{
    if(!d.lat || !d.lng) return;

    let color = markerColor(d);

    let icon = L.divIcon({
      html:`<div style="width:20px;height:20px;border-radius:50%;background:${color};border:2px solid white;"></div>`
    });

    let m = L.marker([d.lat,d.lng],{icon}).addTo(map)
      .bindPopup(`<b>${d.driver_name}</b><br><button onclick="follow(${d.id})">Follow</button>`);

    markers.push(m);

    if(followId === d.id){
      map.setView([d.lat,d.lng],16);
    }
  });
}

async function loadDrivers(){
  let {data} = await supabase.from("driver_locations").select("*");
  drivers = data || [];
  drawDrivers();
}

setInterval(loadDrivers,3000);
loadDrivers();

function follow(id){
  followId = id;
}

function stopFollow(){
  followId = null;
}

function zoomAll(){
  let bounds = drivers.filter(d=>d.lat).map(d=>[d.lat,d.lng]);
  if(bounds.length) map.fitBounds(bounds);
}

async function geocode(place){
  const tries = [
    place,
    place.replace(",", ""),
    place.replace("FL","Florida"),
    place.replace("GA","Georgia"),
    place.replace("NC","North Carolina")
  ];

  for(const t of tries){
    let res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(t)}`);
    let data = await res.json();
    if(data.results && data.results.length){
      return data.results[0];
    }
  }

  throw new Error("Destination not found. Try full name.");
}

async function buildRoute(){

  let driver = drivers.find(d=>d.lat && d.lng);
  if(!driver){
    alert("No driver location yet");
    return;
  }

  let destText = document.getElementById("destinationInput").value;

  try{
    let dest = await geocode(destText);

    let url = `https://api.tomtom.com/routing/1/calculateRoute/${driver.lat},${driver.lng}:${dest.latitude},${dest.longitude}/json?key=${TOMTOM_API_KEY}&traffic=true`;

    let res = await fetch(url);
    let data = await res.json();

    if(!data.routes){
      throw new Error("No route found");
    }

    let points = data.routes[0].legs[0].points.map(p=>[p.latitude,p.longitude]);

    if(routeLine) map.removeLayer(routeLine);

    routeLine = L.polyline(points,{color:"blue"}).addTo(map);
    map.fitBounds(routeLine.getBounds());

    let summary = data.routes[0].summary;

    document.getElementById("routePanel").innerHTML = `
      Distance: ${(summary.lengthInMeters/1609).toFixed(1)} miles<br>
      ETA: ${Math.round(summary.travelTimeInSeconds/60)} minutes<br>
      Traffic Delay: ${Math.round((summary.trafficDelayInSeconds||0)/60)} minutes
    `;

  }catch(err){
    document.getElementById("routePanel").innerHTML = `
      Route error: ${err.message}<br>
      Try: Jacksonville, Florida
    `;
  }
}

</script>

</body>
</html>
