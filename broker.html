<!DOCTYPE html>
<html>
<head>
  <title>Broker Dashboard - Secure</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#0f172a; color:white; }
    .header { background:#111827; padding:20px; text-align:center; }
    .section { padding:20px; max-width:1400px; margin:0 auto; }
    .card { background:#1e293b; border-radius:14px; padding:16px; margin-bottom:16px; }
    .status { padding:10px 12px; border-radius:10px; background:#0f172a; line-height:1.6; }
    .button { padding:12px 18px; background:#2563eb; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; margin-right:10px; }
    #map { width:100%; height:720px; border-radius:14px; }
    .layout { display:grid; grid-template-columns:2fr 1fr; gap:16px; }
    .driver-item { background:#0f172a; border-radius:10px; padding:12px; margin-bottom:10px; line-height:1.7; }
    .badge { display:inline-block; padding:4px 8px; border-radius:999px; font-size:12px; font-weight:bold; margin-top:8px; }
    .green { background:#166534; color:#dcfce7; }
    .yellow { background:#854d0e; color:#fef3c7; }
    .red { background:#991b1b; color:#fee2e2; }
    .marker-pin { width:20px; height:20px; border-radius:50%; border:3px solid white; }
    .marker-green { background:#22c55e; }
    .marker-yellow { background:#f59e0b; }
    .marker-red { background:#ef4444; }
    .route-line { font-size:14px; line-height:1.6; margin-bottom:10px; }
  </style>
</head>

<body>
  <div class="header">
    <h1>Broker Dashboard</h1>
    <p>Admin + Broker Access</p>
  </div>

  <div class="section">

    <div class="card">
      <button class="button" onclick="location.href='/auth.html'">Go to Login</button>
      <button class="button" onclick="signOut()">Sign Out</button>
      <div id="authBox" class="status">Checking login...</div>
    </div>

    <!-- ✅ UPDATED LAYOUT -->
    <div class="layout">

      <!-- MAP -->
      <div class="card">
        <div id="map"></div>
      </div>

      <!-- RIGHT PANEL -->
      <div>

        <!-- DRIVER LIST -->
        <div class="card">
          <h3>My Broker Loads</h3>
          <div id="driverList">Loading...</div>
        </div>

        <!-- 🔥 ETA PANEL -->
        <div class="card">
          <h2>Live Route + ETA</h2>
          <div id="etaPanel">
            <div class="route-line">No active route selected yet.</div>
          </div>
        </div>

      </div>

    </div>

  </div>

  <script>
    const supabaseClient = supabase.createClient(
      "https://mubhwsjppmebuwpmsuwg.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11Ymh3c2pwcG1lYnV3cG1zdXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDEwMjcsImV4cCI6MjA5MTYxNzAyN30.v37pbEsIFvGUAF5vPsqmogVpYa9kdCM42Im8xSCiHSM"
    );

    const TOMTOM_API_KEY = "Y18RLm8evGUvp0THSxz50lZJZMYNqH25";

    const tomtomStreet = L.tileLayer(`https://{s}.api.tomtom.com/map/1/tile/basic/main/{z}/{x}/{y}.png?key=${TOMTOM_API_KEY}`, {
      subdomains:["a","b","c","d"], maxZoom:22
    });

    const map = L.map("map", { layers:[tomtomStreet] }).setView([33.749, -84.388], 6);
    let markersLayer = L.layerGroup().addTo(map);

    function getState(row) {
      if (!row.updated_at) return "red";
      const mins = (Date.now() - new Date(row.updated_at).getTime()) / 60000;
      if (!row.is_tracking) return "red";
      if (mins > 5) return "yellow";
      return "green";
    }

    function makeIcon(state) {
      const cls = state === "green" ? "marker-green" : state === "yellow" ? "marker-yellow" : "marker-red";
      return L.divIcon({ className:"", html:`<div class="marker-pin ${cls}"></div>`, iconSize:[26,26], iconAnchor:[13,13] });
    }

    async function signOut() {
      await supabaseClient.auth.signOut();
      location.href = "/auth.html";
    }

    async function loadSecureData() {
      const { data: userData } = await supabaseClient.auth.getUser();
      const user = userData.user;

      if (!user) {
        document.getElementById("authBox").innerHTML = "Not signed in.";
        document.getElementById("driverList").innerHTML = "No access.";
        return;
      }

      const { data: profile } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("user_id", user.id)
        .maybeSingle();
// 🔒 BILLING LOCK CHECK
const { data: acct } = await supabaseClient
  .from("billing_accounts")
  .select("*")
  .eq("company_name", profile.company_name)
  .maybeSingle();

if (acct && acct.billing_status === "locked") {
  document.getElementById("authBox").innerHTML =
    `Account locked for unpaid FCC balance. Please pay to continue.`;
  return;
}
      // ✅ ADMIN + BROKER ACCESS FIX
      if (!profile || !["broker","admin"].includes(profile.role)) {
        document.getElementById("authBox").innerHTML = "Access denied.";
        document.getElementById("driverList").innerHTML = "No access.";
        return;
      }

      document.getElementById("authBox").innerHTML =
        `Signed in as ${profile.email}<br>Role: ${profile.role}<br>Company: ${profile.company_name}`;

      const { data, error } = await supabaseClient
        .from("driver_locations")
        .select("*")
        .order("updated_at", { ascending:false });

      if (error) {
        document.getElementById("driverList").innerHTML = "Error loading rows.";
        return;
      }

      markersLayer.clearLayers();
      let html = "";
      const bounds = [];

      data.forEach(row => {
        const state = getState(row);

        html += `
          <div class="driver-item">
            <strong>Load ${row.load_number || "N/A"}</strong><br>
            Driver: ${row.driver_name || "N/A"}<br>
            Truck: ${row.truck_number || "N/A"}<br>
            Broker Company: ${row.broker_company || "N/A"}<br>
            <span class="badge ${state}">${state.toUpperCase()}</span>
          </div>
        `;

        if (row.lat && row.lng) {
          L.marker([row.lat, row.lng], { icon: makeIcon(state) })
            .bindPopup(`<strong>Load ${row.load_number || "N/A"}</strong><br>Driver: ${row.driver_name || "N/A"}<br>Truck: ${row.truck_number || "N/A"}`)
            .addTo(markersLayer);
          bounds.push([row.lat, row.lng]);
        }
      });

      document.getElementById("driverList").innerHTML = html || "No broker rows visible.";

      if (bounds.length === 1) map.setView(bounds[0], 12);
      else if (bounds.length > 1) map.fitBounds(bounds, { padding:[40,40] });
    }

    loadSecureData();
    setInterval(loadSecureData, 2000);
  </script>
</body>
</html>
