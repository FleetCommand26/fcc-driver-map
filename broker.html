<!DOCTYPE html>
<html>
<head>
  <title>Broker Dashboard - FCC Driver Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .header {
      background: #111827;
      padding: 20px;
      text-align: center;
    }

    .section {
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .map-box {
      width: 100%;
      height: 420px;
      border: 0;
      border-radius: 12px;
    }

    .back-link {
      color: #93c5fd;
      text-decoration: none;
      font-weight: bold;
    }

    .small {
      color: #cbd5e1;
      font-size: 14px;
    }

    .status {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #14532d;
      color: #bbf7d0;
      font-size: 12px;
      font-weight: bold;
      margin-top: 8px;
    }

    .info {
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Broker Dashboard</h1>
    <p>View tracked driver movement and load activity</p>
  </div>

  <div class="section">
    <div class="card">
      <a class="back-link" href="/index.html">← Back to Home</a>
    </div>

    <div class="card">
      <h2>Live Driver Details</h2>
      <div class="info" id="driverInfo">
        No driver data found yet.
      </div>
      <div id="trackingStatus" class="status">WAITING FOR DRIVER</div>
    </div>

    <div class="card">
      <h2>Live Driver Map</h2>
      <p class="small">Refresh this page after turning on driver tracking.</p>
      <iframe
        id="brokerMap"
        class="map-box"
        src="https://www.google.com/maps?q=Atlanta,GA&output=embed">
      </iframe>
    </div>
  </div>

  <script>
    function loadDriverData() {
      const data = JSON.parse(localStorage.getItem("fccDriverData")) || {};
      const driverInfo = document.getElementById("driverInfo");
      const trackingStatus = document.getElementById("trackingStatus");
      const brokerMap = document.getElementById("brokerMap");

      driverInfo.innerHTML =
        "Driver Name: " + (data.driverName || "Not set") + "<br>" +
        "Truck Number: " + (data.truckNumber || "Not set") + "<br>" +
        "Load Number: " + (data.loadNumber || "Not set") + "<br>" +
        "Driver Status: " + (data.driverStatus || "Not set") + "<br>" +
        "Latitude: " + (data.lat || "Not available") + "<br>" +
        "Longitude: " + (data.lng || "Not available") + "<br>" +
        "Accuracy: " + (data.accuracy || "Not available") + "<br>" +
        "Last Update: " + (data.updatedAt || "Not available");

      if (data.lat && data.lng) {
        brokerMap.src = "https://www.google.com/maps?q=" + data.lat + "," + data.lng + "&output=embed";
      }

      trackingStatus.textContent = data.isTracking ? "TRACKING ACTIVE" : "TRACKING OFF";
    }

    loadDriverData();
    setInterval(loadDriverData, 5000);
  </script>
</body>
</html>
