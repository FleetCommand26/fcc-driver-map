<!DOCTYPE html>
<html>
<head>
  <title>FCC Broker Dispatch Inbox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#0f172a; color:white; }
    .wrap { max-width:1400px; margin:20px auto; padding:20px; }
    .card { background:#1e293b; border-radius:14px; padding:16px; margin-bottom:16px; }
    .grid { display:grid; grid-template-columns:1fr 1.3fr; gap:16px; }
    .status { padding:10px 12px; background:#0f172a; border-radius:10px; line-height:1.6; }
    .row { background:#0f172a; border-radius:10px; padding:12px; margin-bottom:10px; line-height:1.7; }
    .button { padding:12px 18px; border:none; border-radius:10px; background:#2563eb; color:white; font-weight:bold; cursor:pointer; margin-right:10px; margin-top:8px; }
    .secondary { background:#334155; }
    .red { background:#dc2626; }
    .green { background:#166534; }
    .orange { background:#c2410c; }
    .badge { display:inline-block; padding:4px 8px; border-radius:999px; font-size:12px; font-weight:bold; }
    .declined_load { background:#991b1b; color:white; }
    .pod_uploaded { background:#166534; color:white; }
    .general { background:#334155; color:white; }
    .count-red { background:#dc2626; color:white; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:bold; }
    .count-green { background:#166534; color:white; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:bold; }
    .count-blue { background:#2563eb; color:white; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:bold; }
    .unread { border:1px solid #2563eb; }
    .timeline { padding-left:18px; }
    .timeline-item { margin-bottom:10px; }
    select, textarea { width:100%; padding:12px; border:none; border-radius:10px; box-sizing:border-box; margin:8px 0 12px; }

    .toast-wrap {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 99999;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
      color: white;
      pointer-events: auto;
      animation: slideIn 0.25s ease-out;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .toast h4 {
      margin: 0 0 6px 0;
      font-size: 15px;
    }

    .toast p {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.92);
    }

    .toast.declined_load { background: #7f1d1d; }
    .toast.pod_uploaded { background: #14532d; }
    .toast.general { background: #334155; }

    .toast-close {
      margin-top: 10px;
      padding: 6px 10px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.15);
      color: white;
      cursor: pointer;
      font-size: 12px;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px) translateX(12px); }
      to { opacity: 1; transform: translateY(0) translateX(0); }
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns:1fr; }
      .toast-wrap {
        left: 12px;
        right: 12px;
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="toast-wrap" id="toastWrap"></div>

  <div class="wrap">
    <div class="card">
      <h1>Broker Dispatch Inbox</h1>
      <button class="button" onclick="location.href='/auth.html'">Login</button>
      <button class="button secondary" onclick="location.href='/loadboard.html'">Load Board</button>
      <button class="button secondary" onclick="location.href='/dispatch-timeline.html'">Dispatch Timeline</button>
      <button class="button green" onclick="enableDesktopAlerts()">Enable Desktop Alerts</button>
      <button class="button red" onclick="signOut()">Sign Out</button>
      <div id="authBox" class="status">Checking session...</div>
      <div id="notifyStatus" class="status">Notification permission: checking...</div>
    </div>

    <div class="card">
      <span class="count-red">Declined Unread: <span id="declinedCount">0</span></span>
      <span class="count-green" style="margin-left:10px;">POD Unread: <span id="podCount">0</span></span>
      <span class="count-blue" style="margin-left:10px;">All Unread: <span id="allCount">0</span></span>
      <button class="button secondary" onclick="markAllRead()">Mark All Read</button>
      <button class="button green" onclick="syncNotificationsFromData()">Sync Notifications</button>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Notifications</h2>
        <div id="notificationList">Loading notifications...</div>
      </div>

      <div>
        <div class="card">
          <h2>Selected Notification</h2>
          <div id="notificationDetail">Select a notification.</div>
        </div>

        <div class="card">
          <h2>Quick Reassign</h2>
          <select id="reassignLoadSelect">
            <option value="">Select load</option>
          </select>
          <select id="reassignDriverSelect">
            <option value="">Select new driver</option>
          </select>
          <textarea id="reassignNote" placeholder="Reason or note"></textarea>
          <button class="button orange" onclick="reassignLoad()">Reassign Driver</button>
          <div id="reassignStatus" class="status">No reassignment yet.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const supabaseClient = supabase.createClient(
      "https://mubhwsjppmebuwpmsuwg.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11Ymh3c2pwcG1lYnV3cG1zdXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDEwMjcsImV4cCI6MjA5MTYxNzAyN30.v37pbEsIFvGUAF5vPsqmogVpYa9kdCM42Im8xSCiHSM"
    );

    let currentUser = null;
    let currentProfile = null;
    let selectedNotification = null;
    let selectedLoadId = null;
    let shownToastIds = new Set();
    let audioContext = null;

    async function signOut() {
      await supabaseClient.auth.signOut();
      location.href = "/auth.html";
    }

    async function checkAccess() {
      const { data: userData } = await supabaseClient.auth.getUser();
      currentUser = userData.user;

      if (!currentUser) {
        document.getElementById("authBox").innerHTML = "Not signed in.";
        return false;
      }

      const { data: profile } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("user_id", currentUser.id)
        .maybeSingle();

      currentProfile = profile;

      if (!profile || !["admin","broker"].includes(profile.role)) {
        document.getElementById("authBox").innerHTML = "Access denied. Broker or admin required.";
        return false;
      }

      document.getElementById("authBox").innerHTML =
        `Signed in as ${profile.email}<br>Role: ${profile.role}<br>Company: ${profile.company_name}`;
      return true;
    }

    function updateNotificationPermissionStatus() {
      const el = document.getElementById("notifyStatus");
      if (!("Notification" in window)) {
        el.innerHTML = "Browser notifications are not supported in this browser.";
        return;
      }
      el.innerHTML = `Notification permission: ${Notification.permission}`;
    }

    async function enableDesktopAlerts() {
      if (!("Notification" in window)) {
        alert("This browser does not support desktop notifications.");
        return;
      }

      if (Notification.permission === "granted") {
        updateNotificationPermissionStatus();
        alert("Desktop alerts are already enabled.");
        return;
      }

      const permission = await Notification.requestPermission();
      updateNotificationPermissionStatus();

      if (permission === "granted") {
        showSystemNotification("FCC Alerts Enabled", "Broker desktop alerts are now turned on.");
        playAlertSound("general");
      } else {
        alert("Desktop alert permission was not granted.");
      }
    }

    function getAudioContext() {
      if (!audioContext) {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (AudioCtx) {
          audioContext = new AudioCtx();
        }
      }
      return audioContext;
    }

    function playTone(frequency, durationMs, volume) {
      const ctx = getAudioContext();
      if (!ctx) return;

      if (ctx.state === "suspended") {
        ctx.resume().catch(() => {});
      }

      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();

      oscillator.type = "sine";
      oscillator.frequency.value = frequency;
      gainNode.gain.value = volume;

      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);

      const now = ctx.currentTime;
      oscillator.start(now);
      gainNode.gain.setValueAtTime(volume, now);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + durationMs / 1000);
      oscillator.stop(now + durationMs / 1000);
    }

    function playAlertSound(type) {
      try {
        if (type === "declined_load") {
          playTone(520, 180, 0.08);
          setTimeout(() => playTone(420, 220, 0.08), 180);
        } else if (type === "pod_uploaded") {
          playTone(700, 140, 0.07);
          setTimeout(() => playTone(880, 180, 0.07), 140);
        } else {
          playTone(660, 180, 0.07);
        }
      } catch (e) {
        console.log("Sound alert blocked or unavailable.", e);
      }
    }

    function showSystemNotification(title, body) {
      if (!("Notification" in window)) return;
      if (Notification.permission !== "granted") return;

      try {
        new Notification(title, {
          body,
          tag: "fcc-broker-alert",
          renotify: true
        });
      } catch (e) {
        console.log("System notification unavailable.", e);
      }
    }

    async function addNotification(loadId, eventType, title, message, brokerCompany) {
      const { error } = await supabaseClient
        .from("broker_notifications")
        .insert([{
          load_id: loadId,
          event_type: eventType,
          title,
          message,
          broker_company: brokerCompany,
          is_read: false
        }]);
      return error;
    }

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showToast(notification) {
      if (!notification || shownToastIds.has(notification.id)) return;

      shownToastIds.add(notification.id);

      const wrap = document.getElementById("toastWrap");
      const toast = document.createElement("div");
      toast.className = `toast ${notification.event_type || "general"}`;

      toast.innerHTML = `
        <h4>${escapeHtml(notification.title)}</h4>
        <p>${escapeHtml(notification.message || "")}</p>
        <button class="toast-close">Close</button>
      `;

      toast.querySelector(".toast-close").addEventListener("click", () => {
        toast.remove();
      });

      wrap.prepend(toast);

      playAlertSound(notification.event_type || "general");
      showSystemNotification(notification.title, notification.message || "");

      setTimeout(() => {
        toast.remove();
      }, 7000);
    }

    async function syncNotificationsFromData() {
      if (!(await checkAccess())) return;

      const companyFilter = currentProfile.role === "admin" ? null : currentProfile.company_name;

      const { data: declinedLoads } = await supabaseClient
        .from("loads")
        .select("*")
        .eq("status", "declined");

      const { data: podLoads } = await supabaseClient
        .from("loads")
        .select("*")
        .not("pod_path", "is", null);

      for (const load of (declinedLoads || [])) {
        if (companyFilter && load.broker_company !== companyFilter) continue;

        const { data: existing } = await supabaseClient
          .from("broker_notifications")
          .select("id")
          .eq("load_id", load.id)
          .eq("event_type", "declined_load")
          .limit(1);

        if (!existing || existing.length === 0) {
          await addNotification(
            load.id,
            "declined_load",
            `Load ${load.load_number} was declined`,
            `Driver declined load ${load.load_number}.`,
            load.broker_company
          );
        }
      }

      for (const load of (podLoads || [])) {
        if (companyFilter && load.broker_company !== companyFilter) continue;

        const { data: existing } = await supabaseClient
          .from("broker_notifications")
          .select("id")
          .eq("load_id", load.id)
          .eq("event_type", "pod_uploaded")
          .limit(1);

        if (!existing || existing.length === 0) {
          await addNotification(
            load.id,
            "pod_uploaded",
            `POD uploaded for ${load.load_number}`,
            `Proof of delivery uploaded for load ${load.load_number}.`,
            load.broker_company
          );
        }
      }

      loadNotifications();
    }

    async function markRead(notificationId) {
      await supabaseClient
        .from("broker_notifications")
        .update({ is_read: true })
        .eq("id", notificationId);

      loadNotifications();
    }

    async function markAllRead() {
      if (!(await checkAccess())) return;

      let query = supabaseClient
        .from("broker_notifications")
        .update({ is_read: true })
        .eq("is_read", false);

      if (currentProfile.role !== "admin") {
        query = query.eq("broker_company", currentProfile.company_name);
      }

      await query;
      loadNotifications();
    }

    async function getSignedPodUrl(path) {
      if (!path) return null;
      const { data, error } = await supabaseClient
        .storage
        .from("pod-files")
        .createSignedUrl(path, 3600);

      if (error) return null;
      return data.signedUrl;
    }

    async function showNotification(notification) {
      selectedNotification = notification;
      selectedLoadId = notification.load_id;

      await markRead(notification.id);

      const { data: load } = await supabaseClient
        .from("loads")
        .select("*")
        .eq("id", notification.load_id)
        .maybeSingle();

      const { data: dispatches } = await supabaseClient
        .from("dispatch_assignments")
        .select(`
          *,
          driver_locations:driver_location_id(driver_name, truck_number)
        `)
        .eq("load_id", notification.load_id)
        .order("created_at", { ascending: false });

      const { data: events } = await supabaseClient
        .from("trip_events")
        .select("*")
        .eq("load_id", notification.load_id)
        .order("created_at", { ascending: true });

      const podUrl = load?.pod_path ? await getSignedPodUrl(load.pod_path) : null;

      const dispatchHtml = (dispatches || []).map(d => `
        <div class="row">
          Driver: ${d.driver_locations?.driver_name || "N/A"}<br>
          Truck: ${d.driver_locations?.truck_number || "N/A"}<br>
          Status: ${d.status}<br>
          Note: ${d.note || "N/A"}
        </div>
      `).join("");

      const eventHtml = (events || []).map(ev => `
        <div class="timeline-item">
          <strong>${ev.event_type}</strong> — ${new Date(ev.created_at).toLocaleString()}<br>
          ${ev.note || ""}
        </div>
      `).join("");

      document.getElementById("notificationDetail").innerHTML = `
        <div class="row">
          <strong>${notification.title}</strong><br>
          Message: ${notification.message || "N/A"}<br>
          Created: ${new Date(notification.created_at).toLocaleString()}<br>
          Event Type: <span class="badge ${notification.event_type}">${notification.event_type}</span>
        </div>

        <div class="row">
          <strong>Load ${load?.load_number || "N/A"}</strong><br>
          Broker: ${load?.broker_company || "N/A"}<br>
          Pickup: ${load?.pickup_name || "N/A"}<br>
          Delivery: ${load?.delivery_name || "N/A"}<br>
          Status: ${load?.status || "N/A"}<br>
          Decline Reason: ${load?.decline_reason || "N/A"}<br>
          ${podUrl ? `<a href="${podUrl}" target="_blank" style="color:#93c5fd;">View POD</a>` : "No POD uploaded"}
        </div>

        <h3>Dispatch History</h3>
        ${dispatchHtml || "<div class='row'>No dispatch records.</div>"}

        <h3>Status Timeline</h3>
        <div class="timeline">
          ${eventHtml || "No timeline events."}
        </div>
      `;

      document.getElementById("reassignLoadSelect").value = String(notification.load_id);
    }

    async function loadDriversForReassign() {
      const { data, error } = await supabaseClient
        .from("driver_locations")
        .select("*")
        .order("updated_at", { ascending: false });

      if (error) return;

      let options = `<option value="">Select new driver</option>`;
      data.forEach(driver => {
        options += `<option value="${driver.id}">${driver.driver_name || "Driver"} | Truck ${driver.truck_number || "N/A"} | ${driver.driver_status || "N/A"}</option>`;
      });

      document.getElementById("reassignDriverSelect").innerHTML = options;
    }

    async function loadNotifications() {
      let query = supabaseClient
        .from("broker_notifications")
        .select("*")
        .order("created_at", { ascending: false });

      if (currentProfile.role !== "admin") {
        query = query.eq("broker_company", currentProfile.company_name);
      }

      const { data, error } = await query;

      if (error) {
        document.getElementById("notificationList").innerHTML = "Error loading notifications.";
        return;
      }

      const declinedUnread = (data || []).filter(n => n.event_type === "declined_load" && !n.is_read).length;
      const podUnread = (data || []).filter(n => n.event_type === "pod_uploaded" && !n.is_read).length;
      const allUnread = (data || []).filter(n => !n.is_read).length;

      document.getElementById("declinedCount").textContent = declinedUnread;
      document.getElementById("podCount").textContent = podUnread;
      document.getElementById("allCount").textContent = allUnread;

      let html = "";
      let loadOptions = `<option value="">Select load</option>`;

      (data || []).forEach(n => {
        if (n.load_id) {
          loadOptions += `<option value="${n.load_id}">Load ID ${n.load_id}</option>`;
        }

        html += `
          <div class="row ${n.is_read ? "" : "unread"}">
            <strong>${n.title}</strong><br>
            ${n.message || ""}<br>
            <span class="badge ${n.event_type}">${n.event_type}</span><br>
            Read: ${n.is_read ? "Yes" : "No"}<br>
            Created: ${new Date(n.created_at).toLocaleString()}<br>
            <button class="button" onclick="showNotificationById(${n.id})">Open</button>
            <button class="button secondary" onclick="markRead(${n.id})">Mark Read</button>
          </div>
        `;
      });

      document.getElementById("notificationList").innerHTML = html || "No notifications.";
      document.getElementById("reassignLoadSelect").innerHTML = loadOptions;
    }

    async function showNotificationById(id) {
      const { data } = await supabaseClient
        .from("broker_notifications")
        .select("*")
        .eq("id", id)
        .maybeSingle();

      if (data) {
        showNotification(data);
      }
    }

    async function addTripEvent(loadId, eventType, note = "") {
      return await supabaseClient
        .from("trip_events")
        .insert([{
          load_id: loadId,
          event_type: eventType,
          note,
          created_by: currentUser.id
        }]);
    }

    async function reassignLoad() {
      const loadId = Number(document.getElementById("reassignLoadSelect").value);
      const driverId = Number(document.getElementById("reassignDriverSelect").value);
      const note = document.getElementById("reassignNote").value.trim();

      if (!loadId || !driverId) {
        document.getElementById("reassignStatus").innerHTML = "Select both load and driver.";
        return;
      }

      const { error: closeOldError } = await supabaseClient
        .from("dispatch_assignments")
        .update({
          status: "unassigned",
          note: note || "Reassigned from broker inbox",
          updated_at: new Date().toISOString()
        })
        .eq("load_id", loadId)
        .in("status", ["assigned", "declined"]);

      const { error: insertError } = await supabaseClient
        .from("dispatch_assignments")
        .insert([{
          load_id: loadId,
          driver_location_id: driverId,
          assigned_by: currentUser.id,
          status: "assigned",
          note: note || "Reassigned from broker inbox"
        }]);

      const { error: loadUpdateError } = await supabaseClient
        .from("loads")
        .update({
          assigned_driver_location_id: driverId,
          status: "assigned",
          decline_reason: null,
          last_reassigned_at: new Date().toISOString(),
          updated_at: new Date().toISOString()
        })
        .eq("id", loadId);

      await addTripEvent(loadId, "assigned", note || "Load reassigned from broker inbox");

      const finalError = closeOldError || insertError || loadUpdateError;

      document.getElementById("reassignStatus").innerHTML =
        finalError ? `Reassign error: ${finalError.message}` : "Load reassigned successfully.";

      if (!finalError) {
        loadNotifications();
        if (selectedLoadId === loadId) {
          const { data } = await supabaseClient
            .from("broker_notifications")
            .select("*")
            .eq("load_id", loadId)
            .order("created_at", { ascending: false })
            .limit(1);

          if (data && data.length) {
            showNotification(data[0]);
          }
        }
      }
    }

    function subscribeRealtime() {
      supabaseClient
        .channel("broker-inbox-live")
        .on(
          "postgres_changes",
          { event: "INSERT", schema: "public", table: "broker_notifications" },
          payload => {
            const n = payload.new;
            if (!n) return;

            if (currentProfile.role !== "admin" && n.broker_company !== currentProfile.company_name) {
              return;
            }

            showToast(n);
            loadNotifications();
          }
        )
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "broker_notifications" },
          () => loadNotifications()
        )
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "loads" },
          () => {
            loadNotifications();
            if (selectedNotification) showNotificationById(selectedNotification.id);
          }
        )
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "trip_events" },
          () => {
            if (selectedNotification) showNotificationById(selectedNotification.id);
          }
        )
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "dispatch_assignments" },
          () => {
            if (selectedNotification) showNotificationById(selectedNotification.id);
          }
        )
        .subscribe();
    }

    (async () => {
      updateNotificationPermissionStatus();
      const ok = await checkAccess();
      if (ok) {
        await loadDriversForReassign();
        await loadNotifications();
        subscribeRealtime();
      }
    })();
  </script>
</body>
</html>
