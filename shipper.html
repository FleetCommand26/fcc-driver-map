<!DOCTYPE html>
<html>
<head>
  <title>Shipper Dashboard - FCC Driver Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .header {
      background: #111827;
      padding: 20px;
      text-align: center;
    }

    .section {
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .map-box {
      width: 100%;
      height: 420px;
      border: 0;
      border-radius: 12px;
    }

    .back-link {
      color: #93c5fd;
      text-decoration: none;
      font-weight: bold;
    }

    .info {
      line-height: 1.8;
    }

    .status {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #1e3a8a;
      color: #bfdbfe;
      font-size: 12px;
      font-weight: bold;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Shipper Dashboard</h1>
    <p>Shipment visibility and assigned truck movement</p>
  </div>

  <div class="section">
    <div class="card">
      <a class="back-link" href="/index.html">← Back to Home</a>
    </div>

    <div class="card">
      <h2>Shipment Tracking Details</h2>
      <div class="info" id="shipperInfo">
        No shipment data found yet.
      </div>
      <div id="shipperStatus" class="status">WAITING FOR DRIVER</div>
    </div>

    <div class="card">
      <h2>Shipment Map</h2>
      <iframe
        id="shipperMap"
        class="map-box"
        src="https://www.google.com/maps?q=Atlanta,GA&output=embed">
      </iframe>
    </div>
  </div>

  <script>
    function loadDriverData() {
      const data = JSON.parse(localStorage.getItem("fccDriverData")) || {};
      const shipperInfo = document.getElementById("shipperInfo");
      const shipperStatus = document.getElementById("shipperStatus");
      const shipperMap = document.getElementById("shipperMap");

      shipperInfo.innerHTML =
        "Assigned Driver: " + (data.driverName || "Not set") + "<br>" +
        "Assigned Truck: " + (data.truckNumber || "Not set") + "<br>" +
        "Load Number: " + (data.loadNumber || "Not set") + "<br>" +
        "Shipment Status: " + (data.driverStatus || "Not set") + "<br>" +
        "Last Update: " + (data.updatedAt || "Not available");

      if (data.lat && data.lng) {
        shipperMap.src = "https://www.google.com/maps?q=" + data.lat + "," + data.lng + "&output=embed";
      }

      shipperStatus.textContent = data.isTracking ? "SHIPMENT VISIBLE" : "TRACKING OFF";
    }

    loadDriverData();
    setInterval(loadDriverData, 5000);
  </script>
</body>
</html>
