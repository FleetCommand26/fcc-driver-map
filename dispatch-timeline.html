<!DOCTYPE html>
<html>
<head>
  <title>FCC Dispatch Timeline</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#0f172a; color:white; }
    .wrap { max-width:1400px; margin:20px auto; padding:20px; }
    .card { background:#1e293b; border-radius:14px; padding:16px; margin-bottom:16px; }
    .grid { display:grid; grid-template-columns:1.3fr 1fr; gap:16px; }
    .status { padding:10px 12px; background:#0f172a; border-radius:10px; line-height:1.6; }
    .row { background:#0f172a; border-radius:10px; padding:12px; margin-bottom:10px; line-height:1.7; }
    .timeline { padding-left:18px; }
    .timeline-item { margin-bottom:10px; }
    input, select, textarea { width:100%; padding:12px; border:none; border-radius:10px; box-sizing:border-box; margin:8px 0 12px; }
    button { padding:12px 18px; border:none; border-radius:10px; background:#2563eb; color:white; font-weight:bold; cursor:pointer; margin-right:10px; margin-top:8px; }
    .secondary { background:#334155; }
    .red { background:#dc2626; }
    .green { background:#166534; }
    .orange { background:#c2410c; }
    .badge { display:inline-block; padding:4px 8px; border-radius:999px; font-size:12px; font-weight:bold; }
    .open { background:#1d4ed8; color:white; }
    .matched { background:#7c3aed; color:white; }
    .assigned { background:#c2410c; color:white; }
    .accepted { background:#166534; color:white; }
    .declined { background:#991b1b; color:white; }
    .in_transit { background:#0f766e; color:white; }
    .delivered { background:#14532d; color:white; }
    .cancelled { background:#6b7280; color:white; }
    @media (max-width: 900px) { .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>FCC Broker/Admin Timeline</h1>
      <button onclick="location.href='/auth.html'">Login</button>
      <button class="secondary" onclick="location.href='/loadboard.html'">Load Board</button>
      <button class="secondary" onclick="location.href='/admin.html'">Admin</button>
      <button class="red" onclick="signOut()">Sign Out</button>
      <div id="authBox" class="status">Checking session...</div>
    </div>

    <div class="grid">
      <div>
        <div class="card">
          <h2>Loads</h2>
          <div id="loadsList">Loading loads...</div>
        </div>
      </div>

      <div>
        <div class="card">
          <h2>Selected Load</h2>
          <div id="loadDetail">Select a load below.</div>
        </div>

        <div class="card">
          <h2>Reassign After Decline</h2>
          <select id="reassignLoadSelect">
            <option value="">Select load</option>
          </select>
          <select id="reassignDriverSelect">
            <option value="">Select new driver</option>
          </select>
          <textarea id="reassignNote" placeholder="Reason or note for reassignment"></textarea>
          <button class="orange" onclick="reassignLoad()">Reassign Driver</button>
          <div id="reassignStatus" class="status">No reassignment yet.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const supabaseClient = supabase.createClient(
      "https://mubhwsjppmebuwpmsuwg.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11Ymh3c2pwcG1lYnV3cG1zdXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDEwMjcsImV4cCI6MjA5MTYxNzAyN30.v37pbEsIFvGUAF5vPsqmogVpYa9kdCM42Im8xSCiHSM"
    );

    let currentUser = null;
    let currentProfile = null;
    let selectedLoadId = null;

    function statusClass(status) {
      return ["open","matched","assigned","accepted","declined","in_transit","delivered","cancelled"].includes(status)
        ? status
        : "open";
    }

    async function signOut() {
      await supabaseClient.auth.signOut();
      location.href = "/auth.html";
    }

    async function checkAccess() {
      const { data: userData } = await supabaseClient.auth.getUser();
      currentUser = userData.user;

      if (!currentUser) {
        document.getElementById("authBox").innerHTML = "Not signed in.";
        return false;
      }

      const { data: profile } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("user_id", currentUser.id)
        .maybeSingle();

      currentProfile = profile;

      if (!profile || !["admin","broker"].includes(profile.role)) {
        document.getElementById("authBox").innerHTML = "Access denied. Broker or admin required.";
        return false;
      }

      document.getElementById("authBox").innerHTML =
        `Signed in as ${profile.email}<br>Role: ${profile.role}<br>Company: ${profile.company_name}`;
      return true;
    }

    async function addTripEvent(loadId, eventType, note = "") {
      return await supabaseClient
        .from("trip_events")
        .insert([{
          load_id: loadId,
          event_type: eventType,
          note,
          created_by: currentUser.id
        }]);
    }

    async function getSignedPodUrl(path) {
      if (!path) return null;
      const { data, error } = await supabaseClient
        .storage
        .from("pod-files")
        .createSignedUrl(path, 3600);

      if (error) return null;
      return data.signedUrl;
    }

    async function loadDriversForReassign() {
      const { data, error } = await supabaseClient
        .from("driver_locations")
        .select("*")
        .order("updated_at", { ascending: false });

      if (error) return;

      let options = `<option value="">Select new driver</option>`;
      data.forEach(driver => {
        options += `<option value="${driver.id}">${driver.driver_name || "Driver"} | Truck ${driver.truck_number || "N/A"} | ${driver.driver_status || "N/A"}</option>`;
      });

      document.getElementById("reassignDriverSelect").innerHTML = options;
    }

    async function showLoadDetail(loadId) {
      selectedLoadId = loadId;

      const { data: load, error: loadError } = await supabaseClient
        .from("loads")
        .select("*")
        .eq("id", loadId)
        .maybeSingle();

      if (loadError || !load) {
        document.getElementById("loadDetail").innerHTML = "Could not load details.";
        return;
      }

      const { data: dispatches } = await supabaseClient
        .from("dispatch_assignments")
        .select(`
          *,
          driver_locations:driver_location_id(driver_name, truck_number)
        `)
        .eq("load_id", loadId)
        .order("created_at", { ascending: false });

      const { data: events } = await supabaseClient
        .from("trip_events")
        .select("*")
        .eq("load_id", loadId)
        .order("created_at", { ascending: true });

      const podUrl = load.pod_path ? await getSignedPodUrl(load.pod_path) : null;

      const dispatchHtml = (dispatches || []).map(d => `
        <div class="row">
          Driver: ${d.driver_locations?.driver_name || "N/A"}<br>
          Truck: ${d.driver_locations?.truck_number || "N/A"}<br>
          Status: <span class="badge ${statusClass(d.status)}">${d.status.toUpperCase()}</span><br>
          Note: ${d.note || "N/A"}
        </div>
      `).join("");

      const eventHtml = (events || []).map(ev => `
        <div class="timeline-item">
          <strong>${ev.event_type}</strong> — ${new Date(ev.created_at).toLocaleString()}<br>
          ${ev.note || ""}
        </div>
      `).join("");

      document.getElementById("loadDetail").innerHTML = `
        <div class="row">
          <strong>${load.load_number}</strong><br>
          Broker: ${load.broker_company || "N/A"}<br>
          Shipper: ${load.shipper_company || "N/A"}<br>
          Owner: ${load.owner_company || "N/A"}<br>
          Pickup: ${load.pickup_name || "N/A"}<br>
          Delivery: ${load.delivery_name || "N/A"}<br>
          Status: <span class="badge ${statusClass(load.status)}">${(load.status || "open").toUpperCase()}</span><br>
          Decline Reason: ${load.decline_reason || "N/A"}<br>
          ${podUrl ? `<a href="${podUrl}" target="_blank" style="color:#93c5fd;">View POD</a>` : "No POD uploaded"}
        </div>

        <h3>Dispatch History</h3>
        ${dispatchHtml || "<div class='row'>No dispatch history.</div>"}

        <h3>Status Timeline</h3>
        <div class="timeline">
          ${eventHtml || "No timeline events."}
        </div>
      `;

      document.getElementById("reassignLoadSelect").value = String(loadId);
    }

    async function loadLoads() {
      const { data, error } = await supabaseClient
        .from("loads")
        .select("*")
        .order("updated_at", { ascending: false });

      if (error) {
        document.getElementById("loadsList").innerHTML = "Error loading loads.";
        return;
      }

      let html = "";
      let options = `<option value="">Select load</option>`;

      data.forEach(load => {
        options += `<option value="${load.id}">${load.load_number} | ${load.status}</option>`;
        html += `
          <div class="row">
            <strong>${load.load_number}</strong><br>
            Broker: ${load.broker_company || "N/A"}<br>
            Pickup: ${load.pickup_name || "N/A"}<br>
            Delivery: ${load.delivery_name || "N/A"}<br>
            Status: <span class="badge ${statusClass(load.status)}">${(load.status || "open").toUpperCase()}</span><br>
            <button onclick="showLoadDetail(${load.id})">Open Timeline</button>
          </div>
        `;
      });

      document.getElementById("loadsList").innerHTML = html || "No loads found.";
      document.getElementById("reassignLoadSelect").innerHTML = options;
    }

    async function reassignLoad() {
      const loadId = Number(document.getElementById("reassignLoadSelect").value);
      const driverId = Number(document.getElementById("reassignDriverSelect").value);
      const note = document.getElementById("reassignNote").value.trim();

      if (!loadId || !driverId) {
        document.getElementById("reassignStatus").innerHTML = "Select both load and driver.";
        return;
      }

      const { error: closeOldError } = await supabaseClient
        .from("dispatch_assignments")
        .update({
          status: "unassigned",
          note: note || "Reassigned by broker/admin",
          updated_at: new Date().toISOString()
        })
        .eq("load_id", loadId)
        .in("status", ["assigned", "declined"]);

      const { error: insertError } = await supabaseClient
        .from("dispatch_assignments")
        .insert([{
          load_id: loadId,
          driver_location_id: driverId,
          assigned_by: currentUser.id,
          status: "assigned",
          note: note || "Reassigned by broker/admin"
        }]);

      const { error: loadUpdateError } = await supabaseClient
        .from("loads")
        .update({
          assigned_driver_location_id: driverId,
          status: "assigned",
          decline_reason: null,
          last_reassigned_at: new Date().toISOString(),
          updated_at: new Date().toISOString()
        })
        .eq("id", loadId);

      await addTripEvent(loadId, "assigned", note || "Load reassigned to new driver");

      const finalError = closeOldError || insertError || loadUpdateError;

      document.getElementById("reassignStatus").innerHTML =
        finalError ? `Reassign error: ${finalError.message}` : "Load reassigned successfully.";

      if (!finalError) {
        loadLoads();
        showLoadDetail(loadId);
      }
    }

    function subscribeRealtime() {
      supabaseClient
        .channel("broker-admin-timeline")
        .on("postgres_changes", { event: "*", schema: "public", table: "loads" }, () => {
          loadLoads();
          if (selectedLoadId) showLoadDetail(selectedLoadId);
        })
        .on("postgres_changes", { event: "*", schema: "public", table: "dispatch_assignments" }, () => {
          if (selectedLoadId) showLoadDetail(selectedLoadId);
        })
        .on("postgres_changes", { event: "*", schema: "public", table: "trip_events" }, () => {
          if (selectedLoadId) showLoadDetail(selectedLoadId);
        })
        .subscribe();
    }

    (async () => {
      const ok = await checkAccess();
      if (ok) {
        await loadLoads();
        await loadDriversForReassign();
        subscribeRealtime();
      }
    })();
  </script>
</body>
</html>
