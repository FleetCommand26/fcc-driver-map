<!DOCTYPE html>
<html>
<head>
  <title>Driver Tracking - FCC Driver Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .header {
      background: #111827;
      padding: 20px;
      text-align: center;
    }

    .section {
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .button {
      display: inline-block;
      padding: 12px 18px;
      background: #2563eb;
      color: white;
      border-radius: 10px;
      font-weight: bold;
      margin-right: 10px;
      margin-top: 10px;
      border: none;
      cursor: pointer;
    }

    .button.red {
      background: #dc2626;
    }

    .input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 8px;
      margin-bottom: 12px;
      font-size: 16px;
    }

    .status {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #334155;
      margin-top: 8px;
    }

    .coords {
      background: #0f172a;
      padding: 12px;
      border-radius: 10px;
      margin-top: 12px;
      line-height: 1.8;
    }

    .map-box {
      width: 100%;
      height: 350px;
      border: 0;
      border-radius: 12px;
      margin-top: 12px;
    }

    .back-link {
      color: #93c5fd;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>Driver Tracking</h1>
</div>

<div class="section">

  <div class="card">
    <a class="back-link" href="/index.html">← Back</a>
  </div>

  <div class="card">
    <h2>Driver Info</h2>

    <input class="input" id="driverName" placeholder="Driver Name" />
    <input class="input" id="truckNumber" placeholder="Truck Number" />
    <input class="input" id="loadNumber" placeholder="Load Number" />
    <input class="input" id="driverStatus" placeholder="Status (In Transit)" />

    <button class="button" onclick="saveDriver()">Save Driver</button>
  </div>

  <div class="card">
    <h2>Tracking</h2>

    <button class="button" onclick="startTracking()">Start</button>
    <button class="button red" onclick="stopTracking()">Stop</button>

    <div id="status" class="status">OFF</div>

    <div id="coords" class="coords"></div>
  </div>

  <div class="card">
    <iframe id="map" class="map-box"
      src="https://www.google.com/maps?q=Atlanta&output=embed">
    </iframe>
  </div>

</div>

<script>

const supabaseClient = supabase.createClient(
  "https://mubhwsjppmebuwpmsuwg.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11Ymh3c2pwcG1lYnV3cG1zdXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDEwMjcsImV4cCI6MjA5MTYxNzAyN30.v37pbEsIFvGUAF5vPsqmogVpYa9kdCM42Im8xSCiHSM"
);

let watchId = null;
let driverId = null;

async function saveDriver() {

  const { data, error } = await supabaseClient
    .from("driver_locations")
    .insert([{
      driver_name: document.getElementById("driverName").value,
      truck_number: document.getElementById("truckNumber").value,
      load_number: document.getElementById("loadNumber").value,
      driver_status: document.getElementById("driverStatus").value,
      is_tracking: false
    }])
    .select()
    .single();

  if (error) {
    alert(error.message);
    return;
  }

  driverId = data.id;
  alert("Saved");
}

function startTracking() {

  if (!driverId) {
    alert("Save driver first");
    return;
  }

  watchId = navigator.geolocation.watchPosition(async pos => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    document.getElementById("coords").innerHTML =
      "Lat: " + lat + "<br>Lng: " + lng;

    document.getElementById("map").src =
      "https://www.google.com/maps?q=" + lat + "," + lng + "&output=embed";

    await supabaseClient
      .from("driver_locations")
      .update({
        lat: lat,
        lng: lng,
        is_tracking: true,
        updated_at: new Date()
      })
      .eq("id", driverId);

    document.getElementById("status").innerText = "LIVE";

  });

}

function stopTracking() {

  if (watchId) {
    navigator.geolocation.clearWatch(watchId);
  }

  document.getElementById("status").innerText = "STOPPED";

}

</script>

</body>
</html>
