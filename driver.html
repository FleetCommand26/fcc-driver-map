<!DOCTYPE html>
<html>
<head>
  <title>FCC Driver Tracking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      text-align:center;
      padding:30px;
    }
    .card {
      background:#1e293b;
      padding:20px;
      border-radius:12px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Driver Tracking Active</h2>
  <p id="status">Initializing...</p>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://mubhwsjppmebuwpmsuwg.supabase.co",
  "YOUR_ANON_KEY"
);

// 🔥 get loadId from URL
const params = new URLSearchParams(window.location.search);
const loadId = params.get("loadId");

let watchId = null;

// 🔥 start tracking immediately
function startTracking() {
  if (!navigator.geolocation) {
    document.getElementById("status").innerText = "GPS not supported";
    return;
  }

  document.getElementById("status").innerText = "Tracking started...";

  watchId = navigator.geolocation.watchPosition(async (pos) => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    document.getElementById("status").innerText =
      `📍 Live Location\nLat: ${lat}\nLng: ${lng}`;

    // 🔥 update driver location
    await supabaseClient
      .from("driver_locations")
      .update({
        lat: lat,
        lng: lng,
        is_tracking: true,
        updated_at: new Date().toISOString()
      })
      .eq("load_id", loadId);

  }, (err) => {
    document.getElementById("status").innerText =
      "Location error: " + err.message;
  }, {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 10000
  });
}

startTracking();
</script>

</body>
</html>
