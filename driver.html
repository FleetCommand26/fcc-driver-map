<!DOCTYPE html>
<html>
<head>
  <title>FCC Driver Tracking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      text-align:center;
      padding:30px;
    }
    .card {
      background:#1e293b;
      padding:20px;
      border-radius:12px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Driver Tracking Active</h2>
  <p id="status">Initializing...</p>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://mubhwsjppmebuwpmsuwg.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11Ymh3c2pwcG1lYnV3cG1zdXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDEwMjcsImV4cCI6MjA5MTYxNzAyN30.v37pbEsIFvGUAF5vPsqmogVpYa9kdCM42Im8xSCiHSM"
);

// 🔥 get values from tracking link
const params = new URLSearchParams(window.location.search);
const loadId = params.get("loadId");
const driverName = params.get("name") || "Driver";
const phone = params.get("phone") || null;

let watchId = null;

// 🔥 validate loadId
if (!loadId) {
  document.getElementById("status").innerText = "Missing loadId in link";
}

// 🔥 start tracking
function startTracking() {
  if (!navigator.geolocation) {
    document.getElementById("status").innerText = "GPS not supported";
    return;
  }

  document.getElementById("status").innerText = "Tracking started...";

  watchId = navigator.geolocation.watchPosition(async (pos) => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    document.getElementById("status").innerText =
      `📍 ${driverName}\nLat: ${lat}\nLng: ${lng}`;

    // 🔥 UPSERT (creates if missing, updates if exists)
    await supabaseClient
      .from("driver_locations")
      .upsert({
        load_id: loadId,
        driver_name: driverName,
        phone: phone,
        lat: lat,
        lng: lng,
        is_tracking: true,
        updated_at: new Date().toISOString()
      });

  }, (err) => {
    document.getElementById("status").innerText =
      "Location error: " + err.message;
  }, {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 10000
  });
}

startTracking();
</script>

</body>
</html>
