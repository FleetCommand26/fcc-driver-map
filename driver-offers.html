<!DOCTYPE html>
<html>
<head>
  <title>Driver Offers + Trip Lifecycle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#0f172a; color:white; }
    .wrap { max-width:1100px; margin:20px auto; padding:20px; }
    .card { background:#1e293b; border-radius:14px; padding:16px; margin-bottom:16px; }
    .row { background:#0f172a; border-radius:10px; padding:12px; margin-bottom:10px; line-height:1.7; }
    .status { padding:10px 12px; background:#0f172a; border-radius:10px; line-height:1.6; }
    button { padding:12px 18px; border:none; border-radius:10px; background:#2563eb; color:white; font-weight:bold; cursor:pointer; margin-right:10px; margin-top:8px; }
    .green { background:#166534; }
    .red { background:#dc2626; }
    .teal { background:#0f766e; }
    .orange { background:#c2410c; }
    .badge { display:inline-block; padding:4px 8px; border-radius:999px; font-size:12px; font-weight:bold; }
    .assigned { background:#c2410c; color:white; }
    .accepted { background:#166534; color:white; }
    .declined { background:#991b1b; color:white; }
    .in_transit { background:#0f766e; color:white; }
    .delivered { background:#14532d; color:white; }
    .loaded { background:#1d4ed8; color:white; }
    .arrived_pickup { background:#7c3aed; color:white; }
    .arrived_delivery { background:#9333ea; color:white; }
    input, textarea { width:100%; padding:12px; border:none; border-radius:10px; box-sizing:border-box; margin:8px 0 12px; }
    .timeline { margin-top:10px; padding-left:18px; }
    .timeline-item { margin-bottom:8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Driver Offers + Trip Lifecycle</h1>
      <button onclick="location.href='/auth.html'">Login</button>
      <button onclick="location.href='/driver.html'">Driver Map</button>
      <button onclick="signOut()">Sign Out</button>
      <div id="authBox" class="status">Checking session...</div>
    </div>

    <div class="card">
      <h2>My Assigned Loads</h2>
      <div id="offersList">Loading offers...</div>
    </div>
  </div>

  <script>
    const supabaseClient = supabase.createClient(
      "https://mubhwsjppmebuwpmsuwg.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11Ymh3c2pwcG1lYnV3cG1zdXdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDEwMjcsImV4cCI6MjA5MTYxNzAyN30.v37pbEsIFvGUAF5vPsqmogVpYa9kdCM42Im8xSCiHSM"
    );

    let currentUser = null;
    let currentProfile = null;
    let myDriverRow = null;

    function statusClass(status) {
      const allowed = [
        "assigned", "accepted", "declined", "in_transit",
        "delivered", "loaded", "arrived_pickup", "arrived_delivery"
      ];
      return allowed.includes(status) ? status : "assigned";
    }

    async function signOut() {
      await supabaseClient.auth.signOut();
      location.href = "/auth.html";
    }

    async function checkAccess() {
      const { data: userData } = await supabaseClient.auth.getUser();
      currentUser = userData.user;

      if (!currentUser) {
        document.getElementById("authBox").innerHTML = "Not signed in.";
        return false;
      }

      const { data: profile } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("user_id", currentUser.id)
        .maybeSingle();

      currentProfile = profile;

      if (!profile || profile.role !== "driver") {
        document.getElementById("authBox").innerHTML = "Access denied. Driver role required.";
        return false;
      }

      document.getElementById("authBox").innerHTML =
        `Signed in as ${profile.email}<br>Role: ${profile.role}<br>Company: ${profile.company_name}`;

      const { data: driverRows } = await supabaseClient
        .from("driver_locations")
        .select("*")
        .eq("created_by", currentUser.id)
        .order("updated_at", { ascending: false })
        .limit(1);

      myDriverRow = driverRows && driverRows.length ? driverRows[0] : null;
      return true;
    }

    async function addTripEvent(loadId, eventType, note = "") {
      return await supabaseClient
        .from("trip_events")
        .insert([{
          load_id: loadId,
          event_type: eventType,
          note,
          created_by: currentUser.id
        }]);
    }

    async function acceptOffer(dispatchId, loadId) {
      const { error: dErr } = await supabaseClient
        .from("dispatch_assignments")
        .update({
          status: "accepted",
          updated_at: new Date().toISOString()
        })
        .eq("id", dispatchId);

      const { error: lErr } = await supabaseClient
        .from("loads")
        .update({
          status: "accepted",
          updated_at: new Date().toISOString()
        })
        .eq("id", loadId);

      await addTripEvent(loadId, "accepted", "Driver accepted load");

      if (dErr || lErr) {
        alert((dErr && dErr.message) || (lErr && lErr.message));
        return;
      }

      loadOffers();
    }

    async function declineOffer(dispatchId, loadId) {
      const { error: dErr } = await supabaseClient
        .from("dispatch_assignments")
        .update({
          status: "declined",
          updated_at: new Date().toISOString()
        })
        .eq("id", dispatchId);

      const { error: lErr } = await supabaseClient
        .from("loads")
        .update({
          status: "declined",
          updated_at: new Date().toISOString()
        })
        .eq("id", loadId);

      await addTripEvent(loadId, "declined", "Driver declined load");

      if (dErr || lErr) {
        alert((dErr && dErr.message) || (lErr && lErr.message));
        return;
      }

      loadOffers();
    }

    async function setLoadStatus(loadId, newStatus, eventType, note) {
      const { error } = await supabaseClient
        .from("loads")
        .update({
          status: newStatus,
          updated_at: new Date().toISOString(),
          delivered_at: newStatus === "delivered" ? new Date().toISOString() : null
        })
        .eq("id", loadId);

      await addTripEvent(loadId, eventType, note);

      if (error) {
        alert(error.message);
        return;
      }

      loadOffers();
    }

    async function uploadPOD(loadId) {
      const input = document.getElementById(`podFile-${loadId}`);
      const noteInput = document.getElementById(`podNote-${loadId}`);
      const file = input.files[0];

      if (!file) {
        alert("Choose a POD file first.");
        return;
      }

      const filePath = `${currentUser.id}/${loadId}/${Date.now()}-${file.name}`;

      const { error: uploadError } = await supabaseClient
        .storage
        .from("pod-files")
        .upload(filePath, file, { upsert: false });

      if (uploadError) {
        alert(uploadError.message);
        return;
      }

      const { error: updateError } = await supabaseClient
        .from("loads")
        .update({
          pod_path: filePath,
          pod_filename: file.name,
          delivered_at: new Date().toISOString(),
          status: "delivered",
          updated_at: new Date().toISOString()
        })
        .eq("id", loadId);

      await addTripEvent(loadId, "pod_uploaded", noteInput?.value || "POD uploaded");
      await addTripEvent(loadId, "delivered", "Load marked delivered with POD");

      if (updateError) {
        alert(updateError.message);
        return;
      }

      loadOffers();
    }

    async function getSignedPodUrl(path) {
      if (!path) return null;
      const { data, error } = await supabaseClient
        .storage
        .from("pod-files")
        .createSignedUrl(path, 3600);

      if (error) return null;
      return data.signedUrl;
    }

    async function loadOffers() {
      if (!myDriverRow) {
        document.getElementById("offersList").innerHTML = "No driver profile row found for this account.";
        return;
      }

      const { data, error } = await supabaseClient
        .from("dispatch_assignments")
        .select(`
          *,
          loads:load_id(*)
        `)
        .eq("driver_location_id", myDriverRow.id)
        .order("created_at", { ascending: false });

      if (error) {
        document.getElementById("offersList").innerHTML = "Error loading offers.";
        return;
      }

      let html = "";

      for (const row of data) {
        const loadStatus = row.loads?.status || "assigned";

        const { data: timeline } = await supabaseClient
          .from("trip_events")
          .select("*")
          .eq("load_id", row.load_id)
          .order("created_at", { ascending: true });

        const podUrl = row.loads?.pod_path ? await getSignedPodUrl(row.loads.pod_path) : null;

        const timelineHtml = (timeline || []).map(ev => `
          <div class="timeline-item">
            <strong>${ev.event_type}</strong> — ${new Date(ev.created_at).toLocaleString()}<br>
            ${ev.note || ""}
          </div>
        `).join("");

        html += `
          <div class="row">
            <strong>Load ${row.loads?.load_number || "N/A"}</strong><br>
            Pickup: ${row.loads?.pickup_name || "N/A"}<br>
            Pickup Address: ${row.loads?.pickup_address || "N/A"}<br>
            Delivery: ${row.loads?.delivery_name || "N/A"}<br>
            Delivery Address: ${row.loads?.delivery_address || "N/A"}<br>
            Equipment: ${row.loads?.equipment_type || "N/A"}<br>
            Weight: ${row.loads?.weight_lbs || "N/A"}<br>
            Rate: ${row.loads?.rate || "N/A"}<br>
            Dispatch Status: <span class="badge ${statusClass(row.status)}">${row.status.toUpperCase()}</span><br>
            Load Status: <span class="badge ${statusClass(loadStatus)}">${loadStatus.toUpperCase()}</span><br>

            <button class="green" onclick="acceptOffer(${row.id}, ${row.load_id})">Accept</button>
            <button class="red" onclick="declineOffer(${row.id}, ${row.load_id})">Decline</button>
            <button class="teal" onclick="setLoadStatus(${row.load_id}, 'in_transit', 'in_transit', 'Trip started')">Start Trip</button>
            <button class="orange" onclick="setLoadStatus(${row.load_id}, 'in_transit', 'arrived_pickup', 'Arrived at pickup')">Arrived Pickup</button>
            <button class="orange" onclick="setLoadStatus(${row.load_id}, 'in_transit', 'loaded', 'Loaded and departed pickup')">Loaded</button>
            <button class="orange" onclick="setLoadStatus(${row.load_id}, 'in_transit', 'arrived_delivery', 'Arrived at delivery')">Arrived Delivery</button>

            <hr>
            <strong>POD Upload</strong><br>
            <input type="file" id="podFile-${row.load_id}" />
            <textarea id="podNote-${row.load_id}" placeholder="POD note (optional)"></textarea>
            <button class="green" onclick="uploadPOD(${row.load_id})">Upload POD + Mark Delivered</button>
            ${podUrl ? `<div style="margin-top:10px;"><a href="${podUrl}" target="_blank" style="color:#93c5fd;">View Current POD</a></div>` : ""}

            <hr>
            <strong>Status Timeline</strong>
            <div class="timeline">${timelineHtml || "No timeline events yet."}</div>
          </div>
        `;
      }

      document.getElementById("offersList").innerHTML = html || "No offers found.";
    }

    function subscribeRealtime() {
      supabaseClient
        .channel("driver-trip-lifecycle")
        .on("postgres_changes", { event: "*", schema: "public", table: "dispatch_assignments" }, () => loadOffers())
        .on("postgres_changes", { event: "*", schema: "public", table: "loads" }, () => loadOffers())
        .on("postgres_changes", { event: "*", schema: "public", table: "trip_events" }, () => loadOffers())
        .subscribe();
    }

    (async () => {
      const ok = await checkAccess();
      if (ok) {
        await loadOffers();
        subscribeRealtime();
      }
    })();
  </script>
</body>
</html>
